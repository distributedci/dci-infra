---
# Basic usage example for dci.sshd role
# This demonstrates user-managed authorized keys files
#
# Usage: ansible-playbook basic-usage.yml
#
# This example creates SSH config paths for manual key management.
# The admin will need to manually create the key files at:
#   /etc/ssh/authorized_keys.d/admin_%u
#   /etc/ssh/authorized_keys.d/automation_%u
#
# For example:
#   /etc/ssh/authorized_keys.d/admin_ec2-user
#   /etc/ssh/authorized_keys.d/automation_www

- name: Configure SSH with user-managed authorized keys paths
  hosts: all
  become: true

  roles:
    - role: ../../dci.sshd
      dci_sshd_users_authorized_keys:
        # User-managed entries - no files generated by Ansible
        # Admins can manually add keys to these locations
        - file_prefix: admin
        - file_prefix: automation
